<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DarkRed | Ultimate Hardware Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        :root {
            --negro-puro: #050505;
            --negro-tarjeta: rgba(20, 20, 20, 0.7); 
            --rojo-neon: #ff0015;
            --texto-blanco: #ffffff;
            --bradius: 20px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--negro-puro); color: var(--texto-blanco); overflow-x: hidden; }

        /* --- NAVEGACIÓN --- */
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 8%; background: rgba(0,0,0,0.9);
            position: sticky; top: 0; z-index: 100; border-bottom: 2px solid #1a1a1a;
        }
        .logo { font-size: 26px; font-weight: 800; color: var(--rojo-neon); letter-spacing: 3px; }

        /* --- GRID EXPANDIDO --- */
        .container { 
            padding: 50px 8%; 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 35px; 
        }

        /* --- TARJETA CON GLASSMORPHISM --- */
        .product-card {
            background: var(--negro-tarjeta);
            border-radius: var(--bradius);
            overflow: hidden;
            border: 1px solid #222; 
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; flex-direction: column;
        }

        .product-card:hover { 
            border-color: var(--rojo-neon); 
            transform: translateY(-10px);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            box-shadow: 0 15px 35px rgba(255, 0, 21, 0.25);
        }

        /* --- VISOR DE IMAGEN --- */
        .gallery {
            position: relative; width: 100%; height: 320px; 
            background-color: transparent; 
            display: flex; align-items: center; justify-content: center;
            padding: 30px; 
            cursor: zoom-in;
        }

        .gallery img {
            max-width: 100%; max-height: 100%;
            object-fit: contain; 
            transition: 0.4s ease;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.8));
            border-radius: var(--bradius);
        }
        
        .gallery:hover img { transform: scale(1.08); }

        .nav-btn {
            position: absolute; top: 50%; transform: translateY(-50%);
            background: rgba(0,0,0,0.5); color: white; border: 1px solid #333;
            width: 35px; height: 35px; border-radius: 50%; cursor: pointer; z-index: 5;
            transition: 0.3s;
        }
        .nav-btn:hover { background: var(--rojo-neon); border-color: var(--rojo-neon); }
        .btn-prev { left: 10px; }
        .btn-next { right: 10px; }

        .info { padding: 25px; text-align: center; background: rgba(0,0,0,0.2); }
        .info h3 { font-size: 1.1rem; margin-bottom: 8px; letter-spacing: 0.5px; }
        .price { color: var(--rojo-neon); font-size: 1.6rem; font-weight: 800; margin-bottom: 20px; }

        .btn-add {
            background: var(--rojo-neon); color: white; border: none; width: 100%;
            padding: 14px; border-radius: 12px; cursor: pointer; font-weight: 700; text-transform: uppercase; transition: 0.3s;
        }
        .btn-add:hover { filter: brightness(1.2); box-shadow: 0 5px 15px rgba(255, 0, 21, 0.4); }

        /* --- MODAL ZOOM --- */
        #image-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.97);
            display: none; justify-content: center; align-items: center;
            z-index: 2000; cursor: zoom-out;
            backdrop-filter: blur(20px);
        }
        #image-modal img { 
            max-width: 80%; max-height: 80%; 
            border-radius: var(--bradius);
            border: 2px solid var(--rojo-neon);
            box-shadow: 0 0 50px rgba(255, 0, 21, 0.4);
            animation: zoomIn 0.3s ease;
        }
        @keyframes zoomIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        /* --- SIDEBAR CARRITO --- */
        #cart-panel {
            position: fixed; top: 0; right: -100%; width: 400px; height: 100%;
            background: rgba(10, 10, 10, 0.95); backdrop-filter: blur(20px);
            border-left: 2px solid var(--rojo-neon);
            z-index: 1001; padding: 40px 30px; transition: 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }
        #cart-panel.active { right: 0; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; z-index: 1000; }
        .hidden { display: none; }
        input { width: 100%; padding: 15px; margin-bottom: 15px; background: rgba(255,255,255,0.05); border: 1px solid #333; color: white; border-radius: 10px; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">MRD<span> store</span></div>
        <button onclick="toggleCart()" style="background:none; border:2px solid var(--rojo-neon); color:white; padding:10px 20px; border-radius:10px; cursor:pointer; font-weight:600;">🛒 Carrito (<span id="count">0</span>)</button>
    </nav>

    <div id="image-modal" onclick="closeZoom()"><img id="modal-img" src=""></div>
    <div id="overlay" onclick="toggleCart()"></div>

    <aside id="cart-panel">
        <h2 id="title" style="margin-bottom:30px; border-bottom:1px solid #333; padding-bottom:10px;">TU EQUIPO</h2>
        <div id="view-1">
            <div id="items-list" style="max-height: 60vh; overflow-y: auto; margin-bottom: 20px;"></div>
            <p style="font-size: 1.6rem; font-weight: 800;">TOTAL: <span id="total-price" style="color:var(--rojo-neon)">$0</span></p>
            <button class="btn-add" style="margin-top:30px;" onclick="goToCheckout()">COMPLETAR ADQUISICIÓN</button>
        </div>
        <div id="view-2" class="hidden">
            <input type="text" id="user-name" placeholder="Nombre de Agente">
            <input type="text" id="user-addr" placeholder="Coordenadas de Entrega">
            <input type="tel" id="user-tel" placeholder="Canal de Contacto">
            <button id="send-btn" class="btn-add" onclick="finalizar()">CONFIRMAR PEDIDO</button>
            <p onclick="backToItems()" style="text-align:center; color:#666; cursor:pointer; margin-top:20px;">Regresar al carrito</p>
        </div>
    </aside>

    <main class="container" id="product-grid"></main>

    <script>
        const PK = "FTKOePl9p5Jhd8ycX";
        const SID = "service_20iosku";
        const TID = "template_65ewyu8";
        emailjs.init(PK);

        // BASE DE DATOS AMPLIADA (8 PRODUCTOS)
        const db = [
            { id: 1, name: "Gorra Oficial de El Cobrador", price: 800, imgs: ["https://res.cloudinary.com/nox-company/image/upload/v1774219703/rescate%20democratico%20pagina/Gemini_Generated_Image_hjixyuhjixyuhjix_sddstf.png", "https://i.imgur.com/Z8jL3uH.png"], idx: 0 },
            { id: 2, name: "T-Shirt sin cuello del Cobrador", price: 1400, imgs: ["https://res.cloudinary.com/nox-company/image/upload/v1774219708/rescate%20democratico%20pagina/Gemini_Generated_Image_wowulbwowulbwowu_ffrj3w.png", "https://res.cloudinary.com/nox-company/image/upload/v1774219703/rescate%20democratico%20pagina/Gemini_Generated_Image_h4bzaoh4bzaoh4bz_ogrwaz.png"], idx: 0 },
            { id: 3, name: "T-Shirt sin cuello del Cobrador con diseño", price: 2000, imgs: ["https://res.cloudinary.com/nox-company/image/upload/v1774220620/rescate%20democratico%20pagina/Gemini_Generated_Image_ba3fufba3fufba3f_nxh9cs.png", "https://i.imgur.com/FwWv5X4.png"], idx: 0 },
            { id: 4, name: "T-Shirt de cuello formal del Cobrador", price: 1000, imgs: ["https://res.cloudinary.com/nox-company/image/upload/v1774219707/rescate%20democratico%20pagina/Gemini_Generated_Image_12qwdv12qwdv12qw_vruccv.png", "https://i.imgur.com/r62uH0N.png"], idx: 0 },

        ];

        let cart = [];

        function render() {
            const grid = document.getElementById('product-grid');
            db.forEach(p => {
                grid.innerHTML += `
                    <div class="product-card">
                        <div class="gallery">
                            <button class="nav-btn btn-prev" onclick="event.stopPropagation(); slide(${p.id}, -1)">❮</button>
                            <img src="${p.imgs[0]}" id="img-tag-${p.id}" onclick="openZoom(${p.id})">
                            <button class="nav-btn btn-next" onclick="event.stopPropagation(); slide(${p.id}, 1)">❯</button>
                        </div>
                        <div class="info">
                            <h3>${p.name}</h3>
                            <p class="price">$${p.price}</p>
                            <button class="btn-add" onclick="add(${p.id})">Añadir al Carrito</button>
                        </div>
                    </div>
                `;
            });
        }

        function openZoom(id) {
            const p = db.find(x => x.id === id);
            const modal = document.getElementById('image-modal');
            const modalImg = document.getElementById('modal-img');
            modalImg.src = p.imgs[p.idx];
            modal.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closeZoom() {
            document.getElementById('image-modal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        function slide(id, dir) {
            const p = db.find(x => x.id === id);
            p.idx = (p.idx + dir + p.imgs.length) % p.imgs.length;
            const imgEl = document.getElementById(`img-tag-${id}`);
            imgEl.style.opacity = "0.2";
            setTimeout(() => {
                imgEl.src = p.imgs[p.idx];
                imgEl.style.opacity = "1";
            }, 150);
        }

        function toggleCart() {
            document.getElementById('cart-panel').classList.toggle('active');
            const overlay = document.getElementById('overlay');
            overlay.style.display = overlay.style.display === 'block' ? 'none' : 'block';
        }

        function add(id) {
            const p = db.find(x => x.id === id);
            cart.push(p);
            updateCart();
        }

        function updateCart() {
            const list = document.getElementById('items-list');
            list.innerHTML = "";
            let total = 0;
            cart.forEach(item => {
                total += item.price;
                list.innerHTML += `<div style="padding:12px; background:rgba(255,0,21,0.05); border-left:4px solid var(--rojo-neon); margin-bottom:10px; border-radius:8px; display:flex; justify-content:space-between;"><span>${item.name}</span><strong>$${item.price}</strong></div>`;
            });
            document.getElementById('count').innerText = cart.length;
            document.getElementById('total-price').innerText = "$" + total;
        }

        function goToCheckout() {
            if(cart.length === 0) return alert("Carrito vacío");
            document.getElementById('view-1').classList.add('hidden');
            document.getElementById('view-2').classList.remove('hidden');
        }

        function backToItems() {
            document.getElementById('view-1').classList.remove('hidden');
            document.getElementById('view-2').classList.add('hidden');
        }

        function finalizar() {
            const btn = document.getElementById('send-btn');
            btn.innerText = "PROCESANDO...";
            btn.disabled = true;

            const params = {
                nombre: document.getElementById('user-name').value,
                direccion: document.getElementById('user-addr').value,
                telefono: document.getElementById('user-tel').value,
                productos: cart.map(i => i.name).join(", "),
                total: document.getElementById('total-price').innerText
            };

            emailjs.send(SID, TID, params).then(() => {
                alert("PEDIDO Enviado. Nos pondremos en contacto contigo.");
                cart = []; updateCart(); toggleCart();
                btn.disabled = false; btn.innerText = "CONFIRMAR PEDIDO";
            }).catch(() => {
                alert("ERROR EN LA TRANSMISIÓN.");
                btn.disabled = false;
            });
        }

        render();
    </script>
</body>
</html>
