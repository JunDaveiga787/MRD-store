<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MRD Store | Tienda oficial</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        :root {
            --bg-puro: #000000;
            --bg-deep: #0a0a0b; 
            --rojo-mrd: #E3342F;
            --texto-primario: #ffffff;
            --texto-secundario: #a1a1a6;
            --texto-footer: #6e6e73;
            --font-main: 'Inter', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: var(--font-main); -webkit-font-smoothing: antialiased; }
        
        body { 
            background: radial-gradient(circle at center, var(--bg-deep) 0%, var(--bg-puro) 100%);
            background-attachment: fixed;
            color: var(--texto-primario); 
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* NAVIGATION */
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 5%; height: 48px;
            background: rgba(0, 0, 0, 0.8); backdrop-filter: saturate(180%) blur(20px);
            position: sticky; top: 0; z-index: 9999; border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        
        .logo-container { display: flex; align-items: center; text-decoration: none; gap: 8px; }
        .nav-logo-img { height: 28px; width: auto; }
        .logo-container h4 { color: white; font-family: "Montserrat", sans-serif; font-size: 11px; letter-spacing: 1px; text-transform: uppercase; }

        .cart-trigger { background: none; border: none; color: var(--texto-secundario); cursor: pointer; font-size: 12px; padding: 10px; transition: color 0.3s;}
        .cart-trigger span.badge { color: var(--rojo-mrd); font-weight: 700; }

        .main-title {
            text-align: center; font-size: clamp(32px, 8vw, 44px); font-weight: 700; letter-spacing: -1.2px; margin: 50px 0 30px;
            background: linear-gradient(180deg, #fff 0%, #86868b 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .container { 
            padding: 0 5% 80px; 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 20px; 
        }

        /* PRODUCT CARD */
        .product-card {
            background: #161617; 
            border-radius: 18px; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .product-card:hover { transform: translateY(-4px); }

        /* GALLERY CON CONTROLES */
        .gallery {
            position: relative; width: 100%; height: 300px; 
            display: flex; align-items: center; justify-content: center;
            padding: 20px;
        }

        .gallery img { 
            max-width: 100%; max-height: 100%; object-fit: contain; 
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            background: linear-gradient(145deg, #1e1e1f, #161617);
            transition: opacity 0.3s ease;
        }

        /* Botones de navegación */
        .nav-btn {
            position: absolute; top: 50%; transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.1); color: white;
            border: none; width: 34px; height: 34px; border-radius: 50%;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(10px); z-index: 10; opacity: 0;
            transition: all 0.3s ease; font-weight: bold;
        }
        .product-card:hover .nav-btn { opacity: 1; }
        .nav-btn:hover { background: rgba(255, 255, 255, 0.3); }
        .prev { left: 10px; }
        .next { right: 10px; }

        .info { padding: 15px 25px 25px; text-align: center; }
        .info h3 { font-size: 18px; font-weight: 600; margin-bottom: 8px; color: #f5f5f7; }

        .price { margin-bottom: 15px; }
        .price .currency { font-size: 12px; color: var(--texto-secundario); vertical-align: super; }
        .price .amount { font-size: 24px; font-weight: 500; color: #fff; }

        .btn-add {
            background: #0071e3; border: none; color: #fff; 
            padding: 8px 20px; border-radius: 20px; 
            cursor: pointer; font-weight: 400; font-size: 13px;
            transition: opacity 0.2s; width: 100%;
        }

        /* FOOTER */
        footer { background: #000; padding: 30px 5%; color: var(--texto-footer); font-size: 11px; border-top: 1px solid #1d1d1f; text-align: center; }

        /* CART PANEL */
        #cart-panel {
            position: fixed; top: 0; right: -100%; width: 100%; max-width: 380px; height: 100%;
            background: rgba(22, 22, 23, 0.98); backdrop-filter: blur(20px); z-index: 10000; padding: 30px; 
            transition: right 0.4s ease;
        }
        #cart-panel.active { right: 0; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; z-index: 9999; }
        
        .hidden { display: none !important; }

        @media (max-width: 600px) {
            .nav-btn { opacity: 1; width: 40px; height: 40px; } /* Más grandes en móvil */
        }
    </style>
</head>
<body>

    <nav>
        <a href="#" class="logo-container"> 
            <img src="https://res.cloudinary.com/nox-company/image/upload/v1774226262/rescate%20democratico%20pagina/Captura_de_Pantalla_2026-03-22_a_la_s__8.27.04_p.m.-removebg-preview_mdc9mw.png" class="nav-logo-img" alt="Logo">
            <h4>Store</h4>
        </a>
        <button class="cart-trigger" onclick="toggleCart()">Bolsa <span class="badge" id="count">0</span></button>
    </nav>

    <h2 class="main-title">Tienda MRD.</h2>

    <main class="container" id="product-grid"></main>

    <footer>
        <div class="footer-links" style="margin-bottom:15px; display:flex; justify-content:center; gap:15px;">
            <span>Colección 2026</span> • <span>Envíos Nacionales</span>
        </div>
        <p>Copyright © 2026 MRD Store. Santiago, RD.</p>
    </footer>

    <div id="overlay" onclick="toggleCart()"></div>

    <aside id="cart-panel">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
            <h2 style="font-size: 20px; font-weight:600;">Tu Bolsa</h2>
            <span onclick="toggleCart()" style="cursor:pointer; font-size:24px;">&times;</span>
        </div>
        <div id="view-1">
            <div id="items-list"></div>
            <div id="cart-footer" class="hidden">
                <p style="display: flex; justify-content: space-between; margin: 20px 0; border-top: 1px solid #333; padding-top: 15px;">
                    Total: <span id="total-price" style="font-weight:600; color:#fff;">$0</span>
                </p>
                <button class="btn-add" onclick="goToCheckout()">Pagar ahora</button>
            </div>
            <div id="empty-msg" style="text-align:center; color:#6e6e73; margin-top:40px;">Bolsa vacía.</div>
        </div>
        <div id="view-2" class="hidden">
            <input type="text" id="u_name" placeholder="Nombre" style="width:100%; padding:12px; margin-bottom:10px; background:#1c1c1e; border:1px solid #333; color:#fff; border-radius:8px;">
            <input type="tel" id="u_tel" placeholder="WhatsApp" style="width:100%; padding:12px; margin-bottom:20px; background:#1c1c1e; border:1px solid #333; color:#fff; border-radius:8px;">
            <button id="final-btn" class="btn-add" onclick="finalizar()">Confirmar pedido</button>
        </div>
    </aside>

    <script>
        emailjs.init("FTKOePl9p5Jhd8ycX");

        // Base de datos actualizada con múltiples imágenes por producto
        const db = [
            { 
                id: 1, 
                name: "Gorra Cobrador Pro", 
                price: 800, 
                images: [
                    "https://res.cloudinary.com/nox-company/image/upload/v1774219703/rescate%20democratico%20pagina/Gemini_Generated_Image_hjixyuhjixyuhjix_sddstf.png",
                    "https://res.cloudinary.com/nox-company/image/upload/v1774219707/rescate%20democratico%20pagina/Gemini_Generated_Image_12qwdv12qwdv12qw_vruccv.png"
                ],
                currentIdx: 0
            },
            { 
                id: 2, 
                name: "T-Shirt El Cobrador", 
                price: 1400, 
                images: [
                    "https://res.cloudinary.com/nox-company/image/upload/v1774219708/rescate%20democratico%20pagina/Gemini_Generated_Image_wowulbwowulbwowu_ffrj3w.png",
                    "https://res.cloudinary.com/nox-company/image/upload/v1774219703/rescate%20democratico%20pagina/Gemini_Generated_Image_h4bzaoh4bzaoh4bz_ogrwaz.png"
                ],
                currentIdx: 0
            },
            { 
                id: 3, 
                name: "T-Shirt Diseño Pro", 
                price: 2000, 
                images: [
                    "https://res.cloudinary.com/nox-company/image/upload/v1774220620/rescate%20democratico%20pagina/Gemini_Generated_Image_ba3fufba3fufba3f_nxh9cs.png",
                    "https://res.cloudinary.com/nox-company/image/upload/v1774225641/rescate%20democratico%20pagina/Captura_de_Pantalla_2026-03-22_a_la_s_8.27.04_p.m._oqy0yx.png"
                ],
                currentIdx: 0
            },
            { 
                id: 4, 
                name: "T-Shirt Cuello Formal", 
                price: 1000, 
                images: [
                    "https://res.cloudinary.com/nox-company/image/upload/v1774219707/rescate%20democratico%20pagina/Gemini_Generated_Image_12qwdv12qwdv12qw_vruccv.png",
                    "https://res.cloudinary.com/nox-company/image/upload/v1774225641/rescate%20democratico%20pagina/Captura_de_Pantalla_2026-03-22_a_la_s_8.27.04_p.m._oqy0yx.png"
                ],
                currentIdx: 0
            }
        ];

        let cart = [];

        function render() {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = ""; // Limpiar antes de re-renderizar
            db.forEach(p => {
                grid.innerHTML += `
                    <div class="product-card">
                        <div class="gallery">
                            <button class="nav-btn prev" onclick="changeImg(${p.id}, -1)">&#10094;</button>
                            <img src="${p.images[p.currentIdx]}" id="img-${p.id}" alt="${p.name}">
                            <button class="nav-btn next" onclick="changeImg(${p.id}, 1)">&#10095;</button>
                        </div>
                        <div class="info">
                            <h3>${p.name}</h3>
                            <div class="price">
                                <span class="currency">RD$</span><span class="amount">${p.price.toLocaleString()}</span>
                            </div>
                            <button class="btn-add" onclick="add(${p.id})">Añadir a la bolsa</button>
                        </div>
                    </div>
                `;
            });
        }

        function changeImg(productId, step) {
            const product = db.find(p => p.id === productId);
            const imgElement = document.getElementById(`img-${productId}`);
            
            // Animación sutil de salida
            imgElement.style.opacity = "0.3";
            
            setTimeout(() => {
                product.currentIdx += step;
                if (product.currentIdx >= product.images.length) product.currentIdx = 0;
                if (product.currentIdx < 0) product.currentIdx = product.images.length - 1;
                
                imgElement.src = product.images[product.currentIdx];
                imgElement.style.opacity = "1";
            }, 150);
        }

        function toggleCart() {
            const panel = document.getElementById('cart-panel');
            const overlay = document.getElementById('overlay');
            const isActive = panel.classList.toggle('active');
            overlay.style.display = isActive ? 'block' : 'none';
        }

        function add(id) {
            const p = db.find(x => x.id === id);
            cart.push(p);
            updateCart();
            toggleCart();
        }

        function updateCart() {
            const list = document.getElementById('items-list');
            const footer = document.getElementById('cart-footer');
            const empty = document.getElementById('empty-msg');
            list.innerHTML = "";
            let total = 0;
            cart.forEach(item => {
                total += item.price;
                list.innerHTML += `<div style="display:flex; justify-content:space-between; margin-bottom:10px; font-size:14px;"><span>${item.name}</span><b>$${item.price}</b></div>`;
            });
            document.getElementById('count').innerText = cart.length;
            document.getElementById('total-price').innerText = "RD$" + total.toLocaleString();
            if(cart.length > 0) { footer.classList.remove('hidden'); empty.classList.add('hidden'); }
            else { footer.classList.add('hidden'); empty.classList.remove('hidden'); }
        }

        function goToCheckout() { document.getElementById('view-1').classList.add('hidden'); document.getElementById('view-2').classList.remove('hidden'); }
        function backToItems() { document.getElementById('view-1').classList.remove('hidden'); document.getElementById('view-2').classList.add('hidden'); }

        function finalizar() {
            const n = document.getElementById('u_name').value;
            const t = document.getElementById('u_tel').value;
            if(!n || !t) return alert("Por favor completa los datos.");
            
            const btn = document.getElementById('final-btn');
            btn.innerText = "Enviando..."; btn.disabled = true;
            
            const params = { nombre: n, telefono: t, productos: cart.map(i => i.name).join(", "), total: document.getElementById('total-price').innerText };

            emailjs.send("service_20iosku", "template_65ewyu8", params).then(() => {
                alert("✅ Pedido enviado correctamente.");
                cart = []; updateCart(); toggleCart(); backToItems();
                btn.disabled = false; btn.innerText = "Confirmar pedido";
            });
        }

        render();
    </script>
</body>
</html>
