<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MRD Store | Tienda oficial</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jost:ital,wght@0,100..900;1,100..900&family=Manrope:wght@200..800&family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        :root {
            --bg-puro: #000000;
            --bg-deep: #101012; 
            --rojo-mrd: #E3342F;
            --texto-primario: #ffffff;
            --texto-secundario: #a1a1a6;
            --font-apple: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: var(--font-apple); -webkit-font-smoothing: antialiased; }
        
        body { 
            background: radial-gradient(circle at center, var(--bg-deep) 0%, var(--bg-puro) 100%);
            background-attachment: fixed;
            color: var(--texto-primario); 
            min-height: 100vh;
        }

        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 5%; height: 60px; /* Un poco más alto para el logo */
            background: rgba(0, 0, 0, 0.85); backdrop-filter: saturate(180%) blur(20px);
            position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #1d1d1f;
        }
        
        nav h4 {
            color: white;
            font-family: "Montserrat", sans-serif;
            font-size: 13px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            font-weight: 600;
        }
        
        /* --- ESTILO LOGO OPTIMIZADO --- */
        .logo-container { display: flex; align-items: center; text-decoration: none; gap: 12px;}
        
        .nav-logo-img {
            height: 42px; /* Aumentado ligeramente */
            width: auto;  /* Proporción automática */
            max-width: 80px;
            object-fit: contain; /* Para que no se corte ni estire */
            transition: transform 0.3s ease, filter 0.3s ease;
            
        }

        .logo-container:hover .nav-logo-img {
            transform: scale(1.05);
            filter: brightness(1.2);
            border-radius: 3px;
        }

        .main-title {
            text-align: center;
            font-size: 32px;
            font-weight: 800;
            letter-spacing: -1px;
            margin-top: 40px;
            background: linear-gradient(180deg, #fff 0%, #a1a1a6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .cart-trigger { background: none; border: none; color: var(--texto-secundario); cursor: pointer; font-size: 13px; font-weight: 500; transition: 0.3s; }
        .cart-trigger:hover { color: #fff; }
        .cart-trigger span.badge { color: var(--rojo-mrd); font-weight: 700; margin-left: 4px; }

        .container { 
            padding: 30px 5% 80px; 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); 
            gap: 25px; 
        }

        .product-card {
            background: rgba(28, 28, 30, 0.4);
            border: 1px solid rgba(255,255,255,0.03);
            border-radius: 20px;
            overflow: hidden;
            transition: 0.4s ease;
            display: flex; flex-direction: column;
        }

        .product-card:hover { transform: translateY(-5px); background: rgba(44, 44, 46, 0.5); }

        .gallery {
            position: relative; width: 100%; height: 260px; 
            display: flex; align-items: center; justify-content: center;
            padding: 15px; background: rgba(0,0,0,0.2);
        }

        .gallery img {
            max-width: 100%; max-height: 100%;
            object-fit: contain; border-radius: 12px;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.4));
        }
        
        .info { padding: 20px; text-align: center; }
        .info h3 { font-size: 15px; font-weight: 600; margin-bottom: 5px; }
        .price { color: var(--texto-secundario); font-size: 12px; margin-bottom: 15px; }
        .price span { color: #fff; font-weight: 700; font-size: 16px; display: block; }

        .btn-add {
            background: rgba(255,255,255,0.9); border: none; color: #000;
            width: 100%; padding: 10px; border-radius: 12px; 
            cursor: pointer; font-weight: 600; font-size: 12px;
        }

        #cart-panel {
            position: fixed; top: 0; right: -100%; width: 340px; height: 100%;
            background: rgba(20, 20, 22, 0.96); backdrop-filter: blur(25px);
            z-index: 1001; padding: 50px 25px; transition: 0.4s;
            border-left: 1px solid rgba(255,255,255,0.05);
        }
        #cart-panel.active { right: 0; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; z-index: 1000; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <nav>
        <a href="#" class="logo-container"> 
            <img src="https://res.cloudinary.com/nox-company/image/upload/v1774226262/rescate%20democratico%20pagina/Captura_de_Pantalla_2026-03-22_a_la_s__8.27.04_p.m.-removebg-preview_mdc9mw.png" id="nav-logo" class="nav-logo-img" alt="Logo MRD Store">
            <h4>Store</h4>
        </a>
        <button class="cart-trigger" onclick="toggleCart()">Bolsa <span class="badge" id="count">0</span></button>
    </nav>

    <h2 class="main-title">MRD Store</h2>

    <div id="overlay" onclick="toggleCart()"></div>

    <aside id="cart-panel">
        <h2 id="title" style="margin-bottom: 25px; font-size: 20px;">Tu Bolsa</h2>
        <div id="view-1">
            <div id="items-list" style="font-size: 13px;"></div>
            <div style="margin-top: 25px; border-top: 1px solid #222; padding-top: 15px;">
                <p style="display: flex; justify-content: space-between;">Total: <span id="total-price" style="font-weight:700">$0</span></p>
                <button style="background:var(--rojo-mrd); color:white; border:none; width:100%; padding:14px; border-radius:12px; margin-top:15px; cursor:pointer;" onclick="goToCheckout()">Continuar</button>
            </div>
        </div>
        <div id="view-2" class="hidden">
            <button onclick="finalizar()" style="background:var(--rojo-mrd); color:white; border:none; width:100%; padding:14px; border-radius:12px; cursor:pointer;">Finalizar Pedido</button>
        </div>
    </aside>

    <main class="container" id="product-grid"></main>

    <script>
        const PK = "FTKOePl9p5Jhd8ycX";
        const SID = "service_20iosku";
        const TID = "template_65ewyu8";
        emailjs.init(PK);

        const db = [
            { id: 1, name: "Gorra Cobrador Pro", price: 800, imgs: ["https://res.cloudinary.com/nox-company/image/upload/v1774219703/rescate%20democratico%20pagina/Gemini_Generated_Image_hjixyuhjixyuhjix_sddstf.png"], idx: 0 },
            { id: 2, name: "T-Shirt El Cobrador", price: 1400, imgs: ["https://res.cloudinary.com/nox-company/image/upload/v1774219708/rescate%20democratico%20pagina/Gemini_Generated_Image_wowulbwowulbwowu_ffrj3w.png"], idx: 0 },
            { id: 3, name: "T-Shirt Diseño Pro", price: 2000, imgs: ["https://res.cloudinary.com/nox-company/image/upload/v1774220620/rescate%20democratico%20pagina/Gemini_Generated_Image_ba3fufba3fufba3f_nxh9cs.png"], idx: 0 },
            { id: 4, name: "T-Shirt Cuello Formal", price: 1000, imgs: ["https://res.cloudinary.com/nox-company/image/upload/v1774219707/rescate%20democratico%20pagina/Gemini_Generated_Image_12qwdv12qwdv12qw_vruccv.png"], idx: 0 },
        ];

        let cart = [];

        function render() {
            const grid = document.getElementById('product-grid');
            db.forEach(p => {
                grid.innerHTML += `
                    <div class="product-card">
                        <div class="gallery"><img src="${p.imgs[0]}" alt="${p.name}"></div>
                        <div class="info">
                            <h3>${p.name}</h3>
                            <p class="price">Edición Limitada <span>$${p.price}</span></p>
                            <button class="btn-add" onclick="add(${p.id})">Añadir</button>
                        </div>
                    </div>
                `;
            });
        }

        function toggleCart() {
            document.getElementById('cart-panel').classList.toggle('active');
            const overlay = document.getElementById('overlay');
            overlay.style.display = overlay.style.display === 'block' ? 'none' : 'block';
        }

        function add(id) {
            const p = db.find(x => x.id === id);
            cart.push(p);
            updateCart();
            toggleCart();
        }

        function updateCart() {
            const list = document.getElementById('items-list');
            list.innerHTML = "";
            let total = 0;
            cart.forEach(item => {
                total += item.price;
                list.innerHTML += `<div style="display:flex; justify-content:space-between; margin-bottom:10px;"><span>${item.name}</span><b>$${item.price}</b></div>`;
            });
            document.getElementById('count').innerText = cart.length;
            document.getElementById('total-price').innerText = "$" + total;
        }

        render();
    </script>
</body>
</html>
