<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MRD Store | Tienda oficial</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        :root {
            --bg-puro: #000000;
            --bg-deep: #0a0a0b; 
            --rojo-mrd: #E3342F;
            --texto-primario: #ffffff;
            --texto-secundario: #a1a1a6;
            --texto-footer: #6e6e73;
            --font-main: 'Inter', sans-serif;
            --accent-blue: #0071e3;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: var(--font-main); -webkit-font-smoothing: antialiased; }
        
        body { 
            background: radial-gradient(circle at center, var(--bg-deep) 0%, var(--bg-puro) 100%);
            background-attachment: fixed;
            color: var(--texto-primario); 
            min-height: 100vh;
        }

        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 5%; height: 48px;
            background: rgba(0, 0, 0, 0.8); backdrop-filter: saturate(180%) blur(20px);
            position: sticky; top: 0; z-index: 9999; border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        
        .logo-container { display: flex; align-items: center; text-decoration: none; gap: 8px; }
        .nav-logo-img { height: 28px; width: auto; }
        .logo-container h4 { color: white; font-family: "Montserrat", sans-serif; font-size: 11px; letter-spacing: 1px; text-transform: uppercase; }

        .cart-trigger { background: none; border: none; color: var(--texto-secundario); cursor: pointer; font-size: 12px; padding: 10px; }
        .cart-trigger span.badge { color: var(--rojo-mrd); font-weight: 700; }

        .main-title {
            text-align: center; font-size: clamp(32px, 8vw, 44px); font-weight: 700; margin: 50px 0 30px;
            background: linear-gradient(180deg, #fff 0%, #86868b 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .container { padding: 0 5% 80px; display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 24px; }

        .product-card {
            background: #161617; border-radius: 22px; overflow: hidden; display: flex; flex-direction: column;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .gallery {
            position: relative; width: 100%; height: 320px; 
            display: flex; align-items: center; justify-content: center;
            padding: 20px; overflow: hidden; cursor: zoom-in;
        }

        .gallery img { 
            max-width: 100%; max-height: 100%; object-fit: contain; 
            border-radius: 14px; border: 1px solid rgba(255, 255, 255, 0.08);
            background: #1c1c1e; transition: opacity 0.3s ease;
        }

        .price-tag { color: #ffffff; font-size: 24px; font-weight: 500; display: inline-flex; align-items: flex-start; }
        .currency { color: #86868b; font-size: 11px; font-weight: 400; margin-top: 4px; margin-right: 2px; }

        #lightbox {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95); backdrop-filter: blur(15px);
            display: none; align-items: center; justify-content: center;
            z-index: 20000; cursor: zoom-out;
        }
        #lightbox img { max-width: 90%; max-height: 85%; object-fit: contain; border-radius: 10px; }

        .img-nav {
            position: absolute; top: 50%; transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.1); border: none; color: white;
            width: 32px; height: 32px; border-radius: 50%; cursor: pointer; z-index: 15;
        }
        .prev-btn { left: 15px; } .next-btn { right: 15px; }

        .info { padding: 20px 25px 25px; text-align: center; }
        .info h3 { font-size: 18px; margin-bottom: 8px; color: #f5f5f7; }
        .btn-add { background: var(--accent-blue); border: none; color: #fff; padding: 12px; border-radius: 22px; cursor: pointer; width: 100%; margin-top: 15px; font-weight: 600; font-size: 14px; }
        .btn-add:disabled { background: #424245; cursor: not-allowed; }

        /* CARRITO Y FORMULARIO */
        .cart-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; color: #fff; }
        .qty-controls { display: flex; align-items: center; gap: 10px; background: #1c1c1e; padding: 5px 12px; border-radius: 15px; }
        .qty-btn { background: none; border: none; color: var(--accent-blue); font-size: 18px; cursor: pointer; font-weight: bold; }

        footer { padding: 60px 5% 30px; background: #000; border-top: 1px solid #1d1d1f; color: var(--texto-footer); font-size: 12px; line-height: 1.6; }
        .footer-content { max-width: 1000px; margin: 0 auto; }
        .footer-legal { margin-top: 20px; padding-top: 20px; border-top: 1px solid #1d1d1f; display: flex; justify-content: space-between; flex-wrap: wrap; gap: 10px; }

        #cart-panel {
            position: fixed; top: 0; right: -100%; width: 100%; max-width: 380px; height: 100%;
            background: rgba(22, 22, 23, 0.98); backdrop-filter: blur(25px); z-index: 10000; padding: 30px; 
            transition: right 0.4s ease; overflow-y: auto;
        }
        #cart-panel.active { right: 0; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; z-index: 9999; }
        
        .checkout-input { width: 100%; padding: 12px; margin-bottom: 12px; background: #1c1c1e; border: 1px solid #333; color: #fff; border-radius: 10px; font-size: 14px; outline: none; }
        .checkout-input:focus { border-color: var(--accent-blue); }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <nav>
        <a href="#" class="logo-container"> 
            <img src="https://res.cloudinary.com/nox-company/image/upload/v1774226262/rescate%20democratico%20pagina/Captura_de_Pantalla_2026-03-22_a_la_s__8.27.04_p.m.-removebg-preview_mdc9mw.png" class="nav-logo-img">
            <h4>Store</h4>
        </a>
        <button class="cart-trigger" onclick="toggleCart()">Bolsa <span class="badge" id="count">0</span></button>
    </nav>

    <h2 class="main-title">Tienda MRD.</h2>
    <main class="container" id="product-grid"></main>

    <footer>
        <div class="footer-content">
            <p>1. Precios incluyen impuestos y entrega en zonas seleccionadas de Santo Domingo. Los diseños son exclusivos de Rescate Democrático.</p>
            <div class="footer-legal">
                <span>Copyright © 2026 MRD Store. Todos los derechos reservados.</span>
                <div style="display: flex; gap: 15px;">
                    <span>Privacidad</span>
                    <span>Términos de uso</span>
                    <span>Ventas y reembolsos</span>
                </div>
            </div>
        </div>
    </footer>

    <div id="lightbox" onclick="this.style.display='none'">
        <img id="lightbox-img" src="">
    </div>

    <div id="overlay" onclick="toggleCart()"></div>

    <aside id="cart-panel">
        <h2 style="margin-bottom:20px;">Tu Bolsa</h2>
        
        <div id="view-1">
            <div id="items-list"></div>
            <div id="cart-footer" class="hidden">
                <p style="margin: 25px 0; border-top: 1px solid #333; padding-top: 20px; display: flex; justify-content: space-between; align-items: center;">
                    Total: <span id="total-price"></span>
                </p>
                <button class="btn-add" onclick="goToCheckout()">Continuar</button>
            </div>
            <div id="empty-msg" style="text-align:center; margin-top:40px; color: var(--texto-secundario);">Tu bolsa está vacía.</div>
        </div>

        <div id="view-2" class="hidden">
            <input type="text" id="u_name" class="checkout-input" placeholder="Nombre completo">
            <input type="tel" id="u_tel" class="checkout-input" placeholder="WhatsApp / Celular">
            <textarea id="u_location" class="checkout-input" placeholder="Dirección exacta o sector" rows="3"></textarea>
            <button id="final-btn" class="btn-add" onclick="finalizar()">Confirmar Pedido</button>
            <button style="background:none; border:none; color:var(--texto-secundario); width:100%; margin-top:15px; cursor:pointer; font-size:13px;" onclick="goBack()">← Volver a la bolsa</button>
        </div>
    </aside>

    <script>
        emailjs.init("FTKOePl9p5Jhd8ycX");

        const db = [
            { id: 1, name: "Gorra Cobrador Bordada", price: 500, images: ["https://res.cloudinary.com/nox-company/image/upload/v1774219703/rescate%20democratico%20pagina/Gemini_Generated_Image_hjixyuhjixyuhjix_sddstf.png", "https://res.cloudinary.com/nox-company/image/upload/v1774225641/rescate%20democratico%20pagina/Captura_de_Pantalla_2026-03-22_a_la_s_8.27.04_p.m._oqy0yx.png"], currentIndex: 0 },
            { id: 2, name: "T-Shirt sin cuello de El Cobrador", price: 500, images: ["https://res.cloudinary.com/nox-company/image/upload/v1774219708/rescate%20democratico%20pagina/Gemini_Generated_Image_wowulbwowulbwowu_ffrj3w.png", "https://res.cloudinary.com/nox-company/image/upload/v1774231024/rescate%20democratico%20pagina/Duck-ai-image-2026-03-23-01-55_gefunx.jpg"], currentIndex: 0 },
            { id: 3, name: "T-Shirt con Diseño Pro", price: 800, images: ["https://res.cloudinary.com/nox-company/image/upload/v1774220620/rescate%20democratico%20pagina/Gemini_Generated_Image_ba3fufba3fufba3f_nxh9cs.png", "https://res.cloudinary.com/nox-company/image/upload/v1774231024/rescate%20democratico%20pagina/Duck-ai-image-2026-03-23-01-55_gefunx.jpg"], currentIndex: 0 },
            { id: 4, name: "T-Shirt con Cuello Formal", price: 1200, images: ["https://res.cloudinary.com/nox-company/image/upload/v1774219707/rescate%20democratico%20pagina/Gemini_Generated_Image_12qwdv12qwdv12qw_vruccv.png", "https://res.cloudinary.com/nox-company/image/upload/v1774231024/rescate%20democratico%20pagina/Duck-ai-image-2026-03-23-01-56_olsmih.jpg"], currentIndex: 0 },
            { id: 5, name: "Gorra Cobrador no bordada", price: 350, images: ["https://res.cloudinary.com/nox-company/image/upload/v1774219703/rescate%20democratico%20pagina/Gemini_Generated_Image_hjixyuhjixyuhjix_sddstf.png", "https://res.cloudinary.com/nox-company/image/upload/v1774225641/rescate%20democratico%20pagina/Captura_de_Pantalla_2026-03-22_a_la_s_8.27.04_p.m._oqy0yx.png"], currentIndex: 0 },
        ];

        let cart = [];

        function render() {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = "";
            db.forEach(p => {
                grid.innerHTML += `
                    <div class="product-card">
                        <div class="gallery" onclick="openZoom('${p.images[p.currentIndex]}')">
                            <button class="img-nav prev-btn" onclick="event.stopPropagation(); changeImg(${p.id}, -1)">&#10094;</button>
                            <img src="${p.images[p.currentIndex]}" id="img-${p.id}">
                            <button class="img-nav next-btn" onclick="event.stopPropagation(); changeImg(${p.id}, 1)">&#10095;</button>
                        </div>
                        <div class="info">
                            <h3>${p.name}</h3>
                            <div class="price-tag"><span class="currency">RD$</span>${p.price.toLocaleString()}</div>
                            <button class="btn-add" onclick="add(${p.id})">Añadir a la bolsa</button>
                        </div>
                    </div>
                `;
            });
        }

        function openZoom(url) {
            document.getElementById('lightbox-img').src = url;
            document.getElementById('lightbox').style.display = 'flex';
        }

        function changeImg(productId, direction) {
            const p = db.find(x => x.id === productId);
            p.currentIndex = (p.currentIndex + direction + p.images.length) % p.images.length;
            render();
        }

        function toggleCart() {
            const panel = document.getElementById('cart-panel');
            const isActive = panel.classList.toggle('active');
            document.getElementById('overlay').style.display = isActive ? 'block' : 'none';
        }

        function add(id) {
            const existing = cart.find(item => item.product.id === id);
            if (existing) { existing.quantity += 1; } 
            else { cart.push({ product: db.find(x => x.id === id), quantity: 1 }); }
            updateCart();
            if(!document.getElementById('cart-panel').classList.contains('active')) toggleCart();
        }

        function changeQty(id, delta) {
            const item = cart.find(x => x.product.id === id);
            item.quantity += delta;
            if (item.quantity <= 0) { cart = cart.filter(x => x.product.id !== id); }
            updateCart();
        }

        function updateCart() {
            const list = document.getElementById('items-list');
            const empty = document.getElementById('empty-msg');
            list.innerHTML = cart.map(item => `
                <div class="cart-item">
                    <div style="flex:1">
                        <div style="font-weight:500;">${item.product.name}</div>
                        <div class="price-tag" style="font-size:14px;"><span class="currency" style="font-size:8px;">RD$</span>${item.product.price.toLocaleString()}</div>
                    </div>
                    <div class="qty-controls">
                        <button class="qty-btn" onclick="changeQty(${item.product.id}, -1)">-</button>
                        <span style="min-width:20px; text-align:center">${item.quantity}</span>
                        <button class="qty-btn" onclick="changeQty(${item.product.id}, 1)">+</button>
                    </div>
                </div>
            `).join("");

            const totalCount = cart.reduce((acc, item) => acc + item.quantity, 0);
            document.getElementById('count').innerText = totalCount;
            const totalMoney = cart.reduce((acc, item) => acc + (item.product.price * item.quantity), 0);
            document.getElementById('total-price').innerHTML = `<div class="price-tag"><span class="currency">RD$</span>${totalMoney.toLocaleString()}</div>`;
            
            const hasItems = cart.length > 0;
            document.getElementById('cart-footer').classList.toggle('hidden', !hasItems);
            empty.classList.toggle('hidden', hasItems);
        }

        function goToCheckout() {
            document.getElementById('view-1').classList.add('hidden');
            document.getElementById('view-2').classList.remove('hidden');
        }

        function goBack() {
            document.getElementById('view-1').classList.remove('hidden');
            document.getElementById('view-2').classList.add('hidden');
        }

        function finalizar() {
            const name = document.getElementById('u_name').value.trim();
            const tel = document.getElementById('u_tel').value.trim();
            const loc = document.getElementById('u_location').value.trim();
            
            if(!name || !tel || !loc) return alert("Por favor completa todos los campos de contacto.");
            
            const btn = document.getElementById('final-btn');
            btn.innerText = "Enviando...";
            btn.disabled = true;

            // Formatear productos para el correo
            const listaProductos = cart.map(i => `${i.product.name} (x${i.quantity})`).join(", ");
            const totalTexto = document.getElementById('total-price').innerText;

            const templateParams = {
                nombre: name,
                telefono: tel,
                direccion: loc,
                productos: listaProductos,
                total: totalTexto
            };

            emailjs.send("service_20iosku", "template_65ewyu8", templateParams)
                .then(() => {
                    alert("✅ Pedido enviado correctamente. Nos pondremos en contacto vía WhatsApp.");
                    cart = [];
                    updateCart();
                    toggleCart();
                    goBack();
                    btn.innerText = "Confirmar Pedido";
                    btn.disabled = false;
                })
                .catch((error) => {
                    console.error("Error:", error);
                    alert("❌ Hubo un error al enviar. Por favor intenta de nuevo.");
                    btn.innerText = "Confirmar Pedido";
                    btn.disabled = false;
                });
        }

        render();
    </script>
</body>
</html>
